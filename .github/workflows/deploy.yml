name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch: {} # manual "Re-sync now" button in the Actions tab
  schedule:
    - cron: '0 6 * * *' # daily 06:00 UTC — accumulates newly-solved problems

permissions:
  contents: write # allow the sync to commit the accumulated problems.json
  pages: write
  id-token: write

# One deploy at a time, but never cancel an in-progress deploy — let it finish so
# a code push is never silently killed by the scheduled LeetCode auto-commit. A
# newer run just queues; GitHub keeps only the latest pending one.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # Pull latest solves from LeetCode and accumulate into public/problems.json
      - name: Sync from LeetCode
        run: npm run sync

      # Persist the accumulated problem history back to the repo so nothing is
      # ever lost between runs (LeetCode only exposes recent solves).
      - name: Commit accumulated problems
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/problems.json
          if git diff --staged --quiet; then
            echo "No new problems to commit."
          else
            git commit -m "Accumulate solved problems from LeetCode"
            git push
          fi

      - run: npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.a1.outputs.page_url || steps.a2.outputs.page_url || steps.a3.outputs.page_url }}
    steps:
      # Retry deploy-pages up to 3x with backoff — it occasionally returns a
      # transient "Deployment failed, try again later" from the Pages backend.
      - id: a1
        name: Deploy to GitHub Pages (attempt 1)
        uses: actions/deploy-pages@v4
        continue-on-error: true
      - if: steps.a1.outcome == 'failure'
        run: sleep 20
      - id: a2
        name: Deploy to GitHub Pages (attempt 2)
        if: steps.a1.outcome == 'failure'
        uses: actions/deploy-pages@v4
        continue-on-error: true
      - if: steps.a1.outcome == 'failure' && steps.a2.outcome == 'failure'
        run: sleep 30
      - id: a3
        name: Deploy to GitHub Pages (attempt 3)
        if: steps.a1.outcome == 'failure' && steps.a2.outcome == 'failure'
        uses: actions/deploy-pages@v4
